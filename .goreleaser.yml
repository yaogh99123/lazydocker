version: 2

# 全局环境变量设置
env:
  - CGO_ENABLED=0
  - GOFLAGS=-mod=vendor
  - GO111MODULE=auto

# 构建配置
builds:
  - id: binary
    goos:
      - windows
      - darwin
      - linux
    goarch:
      - amd64
      - arm
      - arm64
      - 386
    goarm:
      - 6
      - 7
    # 注意：确保 ldflags 引用了正确的变量
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}} -X main.buildSource=binaryRelease

  # Snap 构建配置 (若需启用，请取消下面的注释)
  # - id: snap
  #   goos:
  #     - linux
  #   goarch:
  #     - amd64
  #     - arm
  #     - arm64
  #     - 386
  #   ldflags:
  #     - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}} -X main.buildSource=snap

# 归档配置
archives:
  - builds:
      - binary
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

# 校验码配置
checksum:
  name_template: "checksums.txt"

# 快照版本命名
snapshot:
  version_template: "{{ .Tag }}-next"

# Changelog 配置
changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^bump"
